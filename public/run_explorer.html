<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Explorer - 轨迹数据可视化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --bg-hover: #f1f5f9;
      --bg-active: #e0f2fe;
      --border: #e2e8f0;
      --border-active: #0ea5e9;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --primary: #0ea5e9;
      --primary-light: #e0f2fe;
      --primary-dark: #0284c7;
      --success: #10b981;
      --success-light: #d1fae5;
      --error: #ef4444;
      --error-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --purple: #8b5cf6;
      --purple-light: #ede9fe;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 50%, #faf5ff 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    /* ========== Layout ========== */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }
    
    /* ========== Header ========== */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      box-shadow: var(--shadow-sm);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    
    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .logo p {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(14, 165, 233, 0.4);
    }
    
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--primary);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* ========== Main Content ========== */
    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
      overflow: hidden;
    }
    
    /* ========== Sidebar ========== */
    .sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .sidebar-header h2::before {
      content: '';
      width: 4px;
      height: 16px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--purple) 100%);
      border-radius: 2px;
    }
    
    .run-select-wrap {
      position: relative;
    }
    
    .run-select-wrap select {
      width: 100%;
      padding: 12px 16px;
      padding-right: 40px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      appearance: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .run-select-wrap select:hover {
      border-color: var(--primary);
    }
    
    .run-select-wrap select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    
    .run-select-wrap::after {
      content: '▼';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }
    
    /* Filters */
    .filters {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    
    .filter-group {
      margin-bottom: 12px;
    }
    
    .filter-group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    
    .filter-selects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    
    .filter-selects.single {
      grid-template-columns: 1fr;
    }
    
    .filter-select {
      width: 100%;
      padding: 7px 28px 7px 10px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      appearance: none;
      cursor: pointer;
      transition: all 0.2s;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }
    
    .filter-select:hover {
      border-color: var(--primary);
    }
    
    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }
    
    .filter-select.active-filter {
      border-color: var(--primary);
      background-color: var(--primary-light);
    }
    
    .active-filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    
    .active-filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--primary);
    }
    
    .active-filter-tag .remove-filter {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    
    .active-filter-tag .remove-filter:hover {
      opacity: 1;
    }
    
    .filter-reset-btn {
      padding: 3px 8px;
      background: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .filter-reset-btn:hover {
      background: var(--error-light);
      color: var(--error);
      border-color: var(--error);
    }
    
    .search-box {
      position: relative;
      margin-bottom: 12px;
    }
    
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }
    
    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .chip input {
      display: none;
    }
    
    .chip.success {
      background: var(--success-light);
      color: var(--success);
    }
    
    .chip.success.active {
      border-color: var(--success);
    }
    
    .chip.failed {
      background: var(--error-light);
      color: var(--error);
    }
    
    .chip.failed.active {
      border-color: var(--error);
    }
    
    .chip.error {
      background: var(--warning-light);
      color: var(--warning);
    }

    .chip.error.active {
      border-color: var(--warning);
    }

    .chip.sideEffect {
      background: #fff7ed;
      color: #f97316;
    }

    .chip.sideEffect.active {
      border-color: #f97316;
    }

    .chip.overdue {
      background: #ede9fe;
      color: #7c3aed;
    }

    .chip.overdue.active {
      border-color: #7c3aed;
    }

    .chip.falseComplete {
      background: #fce7f3;
      color: #be185d;
    }

    .chip.falseComplete.active {
      border-color: #be185d;
    }
    
    /* Task List */
    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .task-item {
      padding: 14px 16px;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-item:hover {
      background: var(--bg-hover);
      border-color: var(--border);
      transform: translateX(4px);
    }
    
    .task-item.active {
      background: var(--primary-light);
      border-color: var(--primary);
    }
    
    .task-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-badge {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    
    .status-badge.success { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-badge.failed { background: var(--error); box-shadow: 0 0 8px var(--error); }
    .status-badge.error { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .status-badge.unknown { background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); box-shadow: 0 0 8px #9ca3af; }
    
    .task-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    
    .task-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      display: flex;
      gap: 12px;
    }
    
    .task-count {
      padding: 2px 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 8px;
      padding-top: 12px;
    }
    
    /* ========== Content Area ========== */
    .content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    
    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .tab:hover {
      color: var(--text);
      background: var(--bg-hover);
    }
    
    .tab.active {
      color: var(--primary);
      background: var(--primary-light);
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      background: var(--primary);
      border-radius: 3px;
    }
    
    /* Tab Content */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .panel.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ========== Cards ========== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .card-title .icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .card-title .icon.blue { background: var(--primary-light); }
    .card-title .icon.green { background: var(--success-light); }
    .card-title .icon.purple { background: var(--purple-light); }
    
    /* Stats Grid */
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stats-grid .stat-card {
      flex: 1 1 auto;
      min-width: 120px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    
    .stat-card.highlight {
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
      color: white;
    }
    
    .stat-card.highlight .stat-label {
      color: rgba(255,255,255,0.8);
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    
    .stat-value.success { color: var(--success); }
    .stat-value.error { color: var(--error); }
    
    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    
    .info-item {
      padding: 12px 16px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }
    
    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-family: var(--mono);
      word-break: break-all;
    }
    
    /* Judge Section */
    .judge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .judge-stat {
      padding: 16px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      text-align: center;
    }
    
    .judge-stat-value {
      font-size: 18px;
      font-weight: 700;
    }
    
    .judge-stat-value.pass { color: var(--success); }
    .judge-stat-value.fail { color: var(--error); }
    
    .judge-stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .judge-item {
      padding: 16px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      border-left: 4px solid var(--border);
    }
    
    .judge-item.passed { border-left-color: var(--success); background: var(--success-light); }
    .judge-item.failed { border-left-color: var(--error); background: var(--error-light); }
    
    .judge-field {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .judge-values {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 12px;
      font-family: var(--mono);
    }
    
    .judge-values span {
      color: var(--text-muted);
    }
    
    /* Warnings */
    .warnings-card {
      background: var(--warning-light);
      border-color: var(--warning);
    }
    
    .warning-item {
      font-size: 12px;
      font-family: var(--mono);
      color: #92400e;
      padding: 8px 12px;
      background: rgba(255,255,255,0.5);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }
    
    /* Collapsible */
    details {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    details summary {
      padding: 14px 18px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      background: var(--bg-card);
      user-select: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    
    details summary:hover {
      background: var(--bg-hover);
    }
    
    details summary::before {
      content: '▶';
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    
    details[open] summary::before {
      transform: rotate(90deg);
    }
    
    details .content {
      padding: 16px;
      background: var(--bg);
    }
    
    .code {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow: auto;
    }
    
    /* ========== Trajectory ========== */
    .trajectory-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .trajectory-header h3 {
      font-size: 18px;
      font-weight: 700;
    }
    
    .trajectory-nav {
      display: flex;
      gap: 8px;
    }
    
    .nav-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .nav-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }
    
    .trajectory-strip {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
    }
    
    .thumb {
      flex-shrink: 0;
      width: 90px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
      box-shadow: var(--shadow-sm);
    }
    
    .thumb:hover {
      transform: scale(1.05);
      border-color: var(--purple);
    }
    
    .thumb.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    
    .thumb img {
      display: block;
      width: 90px;
      height: 160px;
      object-fit: cover;
    }
    
    .thumb-label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--mono);
    }
    
    .step-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    
    .step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--purple-light) 100%);
      border-bottom: 1px solid var(--border);
    }
    
    .step-number {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-dark);
    }
    
    .step-action {
      font-size: 12px;
      font-weight: 600;
      color: var(--purple);
      background: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-family: var(--mono);
    }
    
    .step-body {
      padding: 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
    }
    
    .step-images {
      display: flex;
      gap: 12px;
    }
    
    .step-img-wrap {
      position: relative;
    }
    
    .step-img {
      width: 220px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid var(--border);
    }
    
    .step-img:hover {
      transform: scale(1.02);
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
    }
    
    .img-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }
    
    .step-text {
      min-width: 0;
    }
    
    .step-thought {
      font-size: 14px;
      line-height: 1.7;
      background: var(--bg);
      padding: 16px;
      border-radius: var(--radius-sm);
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    
    .step-route {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--purple);
    }
    
    .step-meta-info {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--purple-light);
      border-radius: var(--radius-sm);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .step-action-data {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--primary-dark);
    }
    
    /* Response Section */
    .response-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    
    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--purple-light) 100%);
      border-bottom: 1px solid var(--border);
    }
    
    .response-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-dark);
    }
    
    .response-file {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      background: white;
      padding: 3px 8px;
      border-radius: 4px;
    }
    
    .response-content {
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .response-pre {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      color: var(--text);
    }
    
    .loading-text {
      color: var(--text-muted);
      font-size: 13px;
    }
    
    .no-response {
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }
    
    /* Prompt/Chat Section */
    .prompt-section {
      margin-top: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    
    .prompt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    
    .prompt-header:hover {
      background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%);
    }
    
    .prompt-title {
      font-size: 13px;
      font-weight: 600;
      color: #92400e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .prompt-toggle {
      font-size: 10px;
      color: #92400e;
      transition: transform 0.2s;
    }
    
    .prompt-section.expanded .prompt-toggle {
      transform: rotate(90deg);
    }
    
    .prompt-content {
      display: none;
      max-height: 600px;
      overflow-y: auto;
    }
    
    .prompt-section.expanded .prompt-content {
      display: block;
    }
    
    .chat-messages {
      padding: 16px;
    }
    
    .chat-message {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      position: relative;
    }
    
    .chat-message:last-child {
      margin-bottom: 0;
    }
    
    .chat-message.system {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      border-left: 4px solid var(--primary);
    }
    
    .chat-message.user {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-left: 4px solid var(--success);
    }
    
    .chat-message.assistant {
      background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
      border-left: 4px solid var(--purple);
    }
    
    .chat-role {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .chat-message.system .chat-role { color: var(--primary-dark); }
    .chat-message.user .chat-role { color: var(--success); }
    .chat-message.assistant .chat-role { color: var(--purple); }
    
    .chat-text {
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    
    /* Collapsible system message */
    .chat-message.system .chat-text {
      max-height: 150px;
      overflow: hidden;
      position: relative;
    }
    
    .chat-message.system .chat-text.expanded {
      max-height: none;
    }
    
    .chat-message.system .chat-text:not(.expanded)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, #e0f2fe);
    }
    
    .expand-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-dark);
      background: rgba(14, 165, 233, 0.1);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .expand-btn:hover {
      background: rgba(14, 165, 233, 0.2);
    }
    
    .chat-image-placeholder {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      margin: 4px 0;
    }
    
    .chat-content-item {
      margin-bottom: 8px;
    }
    
    .chat-content-item:last-child {
      margin-bottom: 0;
    }
    
    /* Full History Button */
    .full-history-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 1px solid #f59e0b;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      color: #92400e;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 10px;
    }
    
    .full-history-btn:hover {
      background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%);
      transform: translateY(-1px);
    }
    
    /* Prompt Modal */
    .prompt-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      backdrop-filter: blur(5px);
    }
    
    .prompt-modal.open {
      display: flex;
    }
    
    .prompt-modal-content {
      background: var(--bg-card);
      border-radius: var(--radius);
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    
    .prompt-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-bottom: 1px solid var(--border);
    }
    
    .prompt-modal-title {
      font-size: 16px;
      font-weight: 700;
      color: #92400e;
    }
    
    .prompt-modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(0,0,0,0.1);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .prompt-modal-close:hover {
      background: rgba(0,0,0,0.2);
    }
    
    .prompt-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .prompt-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }
    
    .prompt-stat {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .prompt-stat strong {
      color: var(--text);
      font-weight: 600;
    }
    
    /* Return Value */
    .return-value {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--success-light);
      border: 1px solid var(--success);
      border-radius: var(--radius-sm);
    }
    
    .return-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    
    .return-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }
    
    /* ========== All Images Grid ========== */
    .images-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .images-header h3 {
      font-size: 18px;
      font-weight: 700;
    }
    
    .images-count {
      font-size: 14px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    
    .image-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    
    .image-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }
    
    .image-card img {
      width: 100%;
      display: block;
    }
    
    .image-card-info {
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    
    /* ========== Lightbox ========== */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }
    
    .lightbox.open {
      display: flex;
    }
    
    .lightbox img {
      max-width: 92%;
      max-height: 92%;
      border-radius: var(--radius);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .lightbox-nav:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-50%) scale(1.1);
    }
    
    .lightbox-prev { left: 24px; }
    .lightbox-next { right: 24px; }
    
    .lightbox-info {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* ========== Empty State ========== */
    .empty {
      text-align: center;
      padding: 60px 30px;
    }
    
    .empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .empty h3 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .empty p {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    /* ========== Badge ========== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .badge.success {
      background: var(--success-light);
      color: var(--success);
    }
    
    .badge.failed {
      background: var(--error-light);
      color: var(--error);
    }
    
    /* ========== Pass@K Stats ========== */
    .pass-k-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .pass-k-item {
      text-align: center;
      padding: 16px 12px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--purple-light) 100%);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    
    .pass-k-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .pass-k-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-dark);
    }
    
    /* ========== Per Task Pass@K Table ========== */
    .task-pass-k-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .task-pass-k-table th,
    .task-pass-k-table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .task-pass-k-table th {
      background: var(--bg);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
    }
    
    .task-pass-k-table tbody tr:hover {
      background: var(--bg-hover);
    }
    
    .task-pass-k-table .task-name-cell {
      font-weight: 600;
      font-family: var(--mono);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .pass-k-cell {
      text-align: center;
      font-family: var(--mono);
    }
    
    .pass-k-cell.full {
      color: var(--success);
      font-weight: 700;
    }
    
    .pass-k-cell.zero {
      color: var(--error);
    }
    
    .pass-k-cell.partial {
      color: var(--warning);
    }
    
    .success-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 120px;
    }
    
    .success-bar-track {
      width: 60px;
      min-width: 60px;
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .success-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success) 0%, #059669 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .success-bar-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      min-width: 55px;
    }
    
    /* ========== Distribution Charts ========== */
    .distribution-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .bar-chart {
      margin-top: 12px;
    }
    
    .bar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    
    .bar-label {
      min-width: 100px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .bar-track {
      flex: 1;
      height: 24px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      min-width: fit-content;
    }
    
    .bar-fill.primary {
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
    }
    
    .bar-fill.success {
      background: linear-gradient(90deg, var(--success) 0%, #059669 100%);
    }
    
    .bar-fill.purple {
      background: linear-gradient(90deg, var(--warning) 0%, #d97706 100%);
    }
    
    .bar-fill.warning {
      background: linear-gradient(90deg, var(--warning) 0%, #d97706 100%);
    }
    
    .bar-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      min-width: 50px;
      text-align: right;
    }
    
    /* ========== Trial Info ========== */
    .trial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }
    
    .trial-item {
      text-align: center;
      padding: 10px 8px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .trial-item:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow);
    }
    
    .trial-item.success {
      background: var(--success-light);
    }
    
    .trial-item.success:hover {
      border-color: var(--success);
    }
    
    .trial-item.failed {
      background: var(--error-light);
    }
    
    .trial-item.failed:hover {
      border-color: var(--error);
    }
    
    .trial-item.error {
      background: var(--warning-light);
    }

    .trial-item.error:hover {
      border-color: var(--warning);
    }

    .trial-item.unknown {
      background: #f3f4f6;
    }
    
    .trial-item.unknown:hover {
      border-color: #6b7280;
    }
    
    .trial-item.current {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }
    
    .trial-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    
    .trial-status {
      font-size: 16px;
    }
    
    /* ========== Table Container ========== */
    .table-container {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    
    /* ========== Task Stats Table ========== */
    .task-stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .task-stats-table th,
    .task-stats-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .task-stats-table th {
      background: var(--bg);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    
    .task-stats-table tbody tr:hover {
      background: var(--bg-hover);
    }
    
    .task-stats-table .task-name-cell {
      font-family: var(--mono);
      max-width: 220px;
    }
    
    .task-stats-table .center-cell {
      text-align: center;
      font-family: var(--mono);
    }
    
    .task-stats-table .actions-cell {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--mono);
    }
    
    .success-rate-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 80px;
    }
    
    .success-rate-value {
      font-size: 14px;
      font-weight: 700;
    }
    
    .success-rate-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .success-rate-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    /* ========== Task Group (for repeat_n > 1) ========== */
    .task-group {
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      transition: all 0.2s;
    }
    
    .task-group:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    
    .task-group.active {
      background: var(--primary-light);
      border-color: var(--primary);
    }
    
    .task-group-header {
      padding: 12px 14px;
      cursor: pointer;
    }
    
    .trial-indicators {
      display: flex;
      gap: 4px;
      padding: 0 14px 12px;
      flex-wrap: wrap;
    }
    
    .trial-indicator {
      position: relative;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
    }
    
    .trial-indicator.success {
      background: var(--success-light);
      color: var(--success);
    }

    .trial-indicator.failed {
      background: var(--error-light);
      color: var(--error);
    }

    .trial-indicator.error {
      background: var(--warning-light);
      color: var(--warning);
    }

    .trial-indicator.unknown {
      background: #f3f4f6;
      color: #6b7280;
    }

    .trial-indicator-tags {
      position: absolute;
      bottom: -2px;
      right: -2px;
      display: flex;
      gap: 1px;
      font-size: 8px;
      line-height: 1;
      pointer-events: none;
    }

    .trial-indicator:hover {
      transform: scale(1.1);
    }
    
    .trial-indicator.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }
    
    .status-badge.partial {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
    }
    
    /* ========== Scrollbar ========== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="logo-icon">📊</div>
        <div>
          <h1>Run Explorer</h1>
          <p>轨迹数据可视化工具</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btnRefresh" onclick="loadRunsViaHttp()">
          <span>🔄</span> 刷新
        </button>
      </div>
    </header>
    
    <main>
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>选择运行记录</h2>
          <div class="run-select-wrap">
            <select id="runSelect" disabled>
              <option value="">加载中...</option>
            </select>
          </div>
        </div>
        
        <div class="filters">
          <div class="search-box">
            <input type="text" id="taskFilter" placeholder="搜索任务..." disabled>
          </div>
          <div id="activeFiltersBar" class="active-filters-bar" style="display: none;"></div>
          <div class="filter-group">
            <div class="filter-selects single">
              <select id="fSuite" class="filter-select" disabled>
                <option value="">全部 Suite</option>
              </select>
            </div>
          </div>
          <div class="filter-group">
            <div class="filter-selects">
              <select id="fDifficulty" class="filter-select" disabled>
                <option value="">难度</option>
              </select>
              <select id="fScope" class="filter-select" disabled>
                <option value="">范围</option>
              </select>
              <select id="fObjective" class="filter-select" disabled>
                <option value="">目标</option>
              </select>
              <select id="fComposition" class="filter-select" disabled>
                <option value="">组合</option>
              </select>
            </div>
          </div>
          <div class="filter-chips">
            <label class="chip success active" title="完美成功：目标达成 + 无副作用 + 主动 COMPLETE">
              <input type="checkbox" id="fSuccess" checked> ✓ 成功
            </label>
            <label class="chip failed active" title="非完美成功（含副作用、超步数、早终止、目标未达成等）">
              <input type="checkbox" id="fFailed" checked> ✗ 失败
            </label>
            <label class="chip error active" title="execution.error / judge_error：系统/判定异常">
              <input type="checkbox" id="fError" checked> ⚠ 错误
            </label>
          </div>
          <div class="filter-chips" style="margin-top: 6px;">
            <label class="chip sideEffect" title="勾选后仅显示带副作用的 trial（USE: judge.clean=false）">
              <input type="checkbox" id="fSideEffect"> 🔧 副作用
            </label>
            <label class="chip overdue" title="勾选后仅显示超步数的 trial（OT: truncated=true 且 judge.success=true）">
              <input type="checkbox" id="fOverdue"> ⏱ 超步数
            </label>
            <label class="chip falseComplete" title="勾选后仅显示 false-complete 的 trial（FC: stop_reason=COMPLETE 但 is_success=false）">
              <input type="checkbox" id="fFalseComplete"> 🚫 错误完成
            </label>
          </div>
        </div>
        
        <div class="task-list" id="taskList">
          <div class="empty">
            <div class="empty-icon">📋</div>
            <h3>加载中...</h3>
            <p>正在加载任务列表</p>
          </div>
        </div>
      </aside>
      
      <div class="content">
        <div class="tabs">
          <button class="tab active" data-tab="overview">📊 概览</button>
          <button class="tab" data-tab="detail">📝 任务详情</button>
          <button class="tab" data-tab="trajectory">🎯 轨迹查看</button>
          <button class="tab" data-tab="all-images">🖼️ 全部截图</button>
        </div>
        
        <div class="tab-content">
          <!-- Overview Panel -->
          <div class="panel active" id="panel-overview">
            <div class="empty" id="overviewEmpty">
              <div class="empty-icon">📊</div>
              <h3>加载中...</h3>
              <p>正在从服务器加载运行记录</p>
            </div>
            <div id="overviewContent" style="display: none;"></div>
          </div>
          
          <!-- Detail Panel -->
          <div class="panel" id="panel-detail">
            <div class="empty" id="detailEmpty">
              <div class="empty-icon">📝</div>
              <h3>选择任务</h3>
              <p>从左侧列表选择一个任务来查看详情</p>
            </div>
            <div id="detailContent" style="display: none;"></div>
          </div>
          
          <!-- Trajectory Panel -->
          <div class="panel" id="panel-trajectory">
            <div class="empty" id="trajectoryEmpty">
              <div class="empty-icon">🎯</div>
              <h3>选择任务</h3>
              <p>从左侧列表选择一个任务来查看轨迹</p>
            </div>

          </div>
          
          <!-- All Images Panel -->
          <div class="panel" id="panel-all-images">
            <div class="empty" id="allImagesEmpty">
              <div class="empty-icon">🖼️</div>
              <h3>选择任务</h3>
              <p>从左侧列表选择一个任务来查看所有截图</p>

            <div id="allImagesContent" style="display: none;"></div>
          </div>

    </main>
  </div>
  
  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">›</button>
    <div class="lightbox-info" id="lightboxInfo"></div>
  </div>
  
  <!-- Prompt Modal -->
  <div class="prompt-modal" id="promptModal">
    <div class="prompt-modal-content">
      <div class="prompt-modal-header">
        <span class="prompt-modal-title">📝 完整对话历史</span>
        <button class="prompt-modal-close" onclick="closePromptModal()">×</button>
      </div>
      <div class="prompt-modal-body" id="promptModalBody">
        <!-- Content will be injected here -->
      </div>
    </div>
  </div>
  
  <script>
    // =========== Helpers ===========
    const el = id => document.getElementById(id);
    const API_BASE = '/api/runs';
    
    async function fetchJson(urlPath, timeout = 30000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(API_BASE + urlPath, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      } catch (e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') throw new Error('Request timeout');
        throw e;
      }
    }
    
    async function fetchText(urlPath, timeout = 30000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(API_BASE + urlPath, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.text();
      } catch (e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') throw new Error('Request timeout');
        throw e;
      }
    }
    
    function imageUrl(urlPath) {
      return API_BASE + urlPath;
    }
    
    function escapeHtml(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    
    function formatValue(v) {
      if (v === null) return 'null';
      if (v === undefined) return 'undefined';
      if (typeof v === 'boolean') return v ? 'true' : 'false';
      if (typeof v === 'string') return v.length > 120 ? `"${v.slice(0, 120)}..."` : `"${v}"`;
      if (typeof v === 'object') return JSON.stringify(v).slice(0, 120);
      return String(v);
    }
    
    function formatTime(t) {
      if (!t) return '-';
      try { return new Date(t).toLocaleString('zh-CN'); } catch { return t; }
    }
    
    function debounce(fn, ms = 150) {
      let t = null;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }
    
    // =========== Taxonomy Filter Logic ===========
    
    // Populate suite + taxonomy filter dropdowns from loaded results
    function populateFilterOptions() {
      const allRes = state.allResults || [];
      const suites = new Set();
      const difficulties = new Set();
      const scopes = new Set();
      const objectives = new Set();
      const compositions = new Set();
      
      for (const r of allRes) {
        if (r.suite) suites.add(r.suite);
        if (r.difficulty) difficulties.add(r.difficulty);
        if (r.scope) scopes.add(r.scope);
        if (r.objective) objectives.add(r.objective);
        if (r.composition) compositions.add(r.composition);
      }
      
      const fillSelect = (id, defaultLabel, values, sortFn) => {
        const sel = el(id);
        const curVal = sel.value;
        sel.innerHTML = `<option value="">${defaultLabel}</option>`;
        const sorted = [...values].sort(sortFn || ((a, b) => a.localeCompare(b)));
        sorted.forEach(v => sel.appendChild(new Option(v, v)));
        sel.disabled = sorted.length === 0;
        if (curVal && sorted.includes(curVal)) sel.value = curVal;
      };
      
      fillSelect('fSuite', `全部 Suite (${suites.size})`, suites);
      fillSelect('fDifficulty', '难度', difficulties);
      fillSelect('fScope', '范围', scopes);
      fillSelect('fObjective', '目标', objectives);
      fillSelect('fComposition', '组合', compositions);
      
      updateActiveFiltersBar();
    }
    
    // Get the taxonomy dimensions for a particular task (from its first result)
    function getResultTaxonomy(taskId) {
      const trials = state.resultsByTask?.get(taskId);
      if (!trials || trials.length === 0) return null;
      const r = trials[0];
      return {
        suite: r.suite || null,
        difficulty: r.difficulty || null,
        scope: r.scope || null,
        objective: r.objective || null,
        composition: r.composition || null,
      };
    }
    
    // Check if a task passes all taxonomy filters
    function taskPassesTaxonomyFilters(taskId) {
      const fSuite = el('fSuite').value;
      const fDifficulty = el('fDifficulty').value;
      const fScope = el('fScope').value;
      const fObjective = el('fObjective').value;
      const fComposition = el('fComposition').value;
      
      // No filter active = pass
      if (!fSuite && !fDifficulty && !fScope && !fObjective && !fComposition) return true;
      
      const tax = getResultTaxonomy(taskId);
      if (!tax) return false;
      
      if (fSuite && tax.suite !== fSuite) return false;
      if (fDifficulty && tax.difficulty !== fDifficulty) return false;
      if (fScope && tax.scope !== fScope) return false;
      if (fObjective && tax.objective !== fObjective) return false;
      if (fComposition && tax.composition !== fComposition) return false;
      return true;
    }
    
    // Get results filtered by all taxonomy filters
    function getFilteredResults() {
      const allRes = state.allResults || [];
      const fSuite = el('fSuite').value;
      const fDifficulty = el('fDifficulty').value;
      const fScope = el('fScope').value;
      const fObjective = el('fObjective').value;
      const fComposition = el('fComposition').value;
      
      if (!fSuite && !fDifficulty && !fScope && !fObjective && !fComposition) return allRes;
      
      return allRes.filter(r => {
        if (fSuite && r.suite !== fSuite) return false;
        if (fDifficulty && r.difficulty !== fDifficulty) return false;
        if (fScope && r.scope !== fScope) return false;
        if (fObjective && r.objective !== fObjective) return false;
        if (fComposition && r.composition !== fComposition) return false;
        return true;
      });
    }
    
    // Check if any taxonomy filter is active
    function hasTaxonomyFilters() {
      return !!(el('fSuite').value || el('fDifficulty').value || el('fScope').value ||
               el('fObjective').value || el('fComposition').value);
    }
    
    // Render the active filters tags bar
    function updateActiveFiltersBar() {
      const bar = el('activeFiltersBar');
      const filters = [
        { id: 'fSuite', label: 'Suite' },
        { id: 'fDifficulty', label: '难度' },
        { id: 'fScope', label: '范围' },
        { id: 'fObjective', label: '目标' },
        { id: 'fComposition', label: '组合' },
      ];
      const active = filters.filter(f => el(f.id).value);
      
      if (active.length === 0) {
        bar.style.display = 'none';
        return;
      }
      
      bar.style.display = 'flex';
      bar.innerHTML = active.map(f =>
        `<span class="active-filter-tag">${f.label}: ${el(f.id).value} <span class="remove-filter" onclick="el('${f.id}').value=''; onTaxonomyFilterChange()">×</span></span>`
      ).join('') + `<button class="filter-reset-btn" onclick="resetTaxonomyFilters()">清除全部</button>`;
      
      // Update select highlight
      filters.forEach(f => {
        el(f.id).classList.toggle('active-filter', !!el(f.id).value);
      });
    }
    
    function resetTaxonomyFilters() {
      ['fSuite', 'fDifficulty', 'fScope', 'fObjective', 'fComposition'].forEach(id => { el(id).value = ''; });
      onTaxonomyFilterChange();
    }
    
    function onTaxonomyFilterChange() {
      updateActiveFiltersBar();
      renderTaskList();
      renderOverview();
    }
    
    // Render chat messages from prompt array
    function renderChatMessages(messages, uniquePrefix = '') {
      if (!messages || !Array.isArray(messages)) return '<div class="no-response">无对话数据</div>';
      
      return messages.map((msg, msgIdx) => {
        const role = msg.role || 'unknown';
        const roleIcon = role === 'system' ? '⚙️' : role === 'user' ? '👤' : role === 'assistant' ? '🤖' : '❓';
        const roleName = role === 'system' ? 'System' : role === 'user' ? 'User' : role === 'assistant' ? 'Assistant' : role;
        const textId = `${uniquePrefix}_msg_${msgIdx}`;
        
        let contentHtml = '';
        let isLongSystemMsg = false;
        
        if (typeof msg.content === 'string') {
          // Simple string content
          isLongSystemMsg = role === 'system' && msg.content.length > 500;
          contentHtml = `<div class="chat-text" id="${textId}">${escapeHtml(msg.content)}</div>`;
          if (isLongSystemMsg) {
            contentHtml += `<button class="expand-btn" onclick="toggleSystemMsg('${textId}', this)">▼ 展开完整内容</button>`;
          }
        } else if (Array.isArray(msg.content)) {
          // Array of content items (multimodal)
          contentHtml = msg.content.map(item => {
            if (item.type === 'text') {
              return `<div class="chat-content-item chat-text">${escapeHtml(item.text || '')}</div>`;
            } else if (item.type === 'image_url') {
              // Show placeholder for image (data stripped)
              const url = item.image_url?.url || '';
              const isStripped = url.includes('STRIPPED') || url.startsWith('[');
              return `<div class="chat-content-item">
                <div class="chat-image-placeholder">
                  🖼️ ${isStripped ? '图片 (数据已省略)' : '图片'}
                </div>
              </div>`;
            }
            return '';
          }).join('');
        }
        
        return `
          <div class="chat-message ${role}">
            <div class="chat-role">${roleIcon} ${roleName}</div>
            ${contentHtml}
          </div>
        `;
      }).join('');
    }
    
    function toggleSystemMsg(textId, btn) {
      const textEl = document.getElementById(textId);
      if (!textEl) return;
      
      if (textEl.classList.contains('expanded')) {
        textEl.classList.remove('expanded');
        btn.innerHTML = '▼ 展开完整内容';
      } else {
        textEl.classList.add('expanded');
        btn.innerHTML = '▲ 收起';
      }
    }
    
    // Get prompt stats
    function getPromptStats(messages) {
      if (!messages || !Array.isArray(messages)) return { total: 0, system: 0, user: 0, assistant: 0 };
      return {
        total: messages.length,
        system: messages.filter(m => m.role === 'system').length,
        user: messages.filter(m => m.role === 'user').length,
        assistant: messages.filter(m => m.role === 'assistant').length
      };
    }
    
    // =========== State ===========
    const state = {
      runsList: [],
      runDirName: '',
      meta: null,
      summary: null,
      results: new Map(),
      allResults: [],
      resultsByTask: new Map(),
      tasks: [],
      taskGroups: new Map(),
      selectedTask: null,
      trajectory: [],
      selectedStepIdx: 0,
      mediaCache: new Map(),
      actionTypesCache: null,
      perTaskActionTypes: {},
      actionTypesLoading: false,
      isLoading: false,  // Prevent duplicate operations
    };
    
    let lightboxImages = [];
    let lightboxIndex = 0;
    
    // =========== Data Loading ===========
    
    async function loadRunsViaHttp() {
      state.runDirName = '';
      
      try {
        const data = await fetchJson('');
        state.runsList = data.runs || [];
      } catch (e) {
        console.error('Failed to load runs:', e);
        state.runsList = [];
      }
      
      await refreshRunsDropdown();
    }
    
    async function refreshRunsDropdown() {
      const sel = el('runSelect');
      sel.innerHTML = '';
      
      if (state.runsList.length === 0) {
        sel.disabled = true;
        sel.innerHTML = '<option value="">runs 目录下没有子目录</option>';
        return;
      }
      
      sel.disabled = false;
      sel.innerHTML = '<option value="">选择一个 run...</option>';
      state.runsList.forEach(name => sel.appendChild(new Option(name, name)));
      
      // Auto select first
      if (!state.runDirName && state.runsList.length > 0) {
        sel.value = state.runsList[0];
        await loadRunDir(state.runsList[0]);
      }
    }
    
    async function loadRunDir(runName) {
      if (state.isLoading) return;
      state.isLoading = true;
      
      try {
        // Show loading state
        el('overviewEmpty').innerHTML = `
          <div class="empty-icon">⏳</div>
          <h3>加载中...</h3>
          <p>正在加载 ${runName}</p>
        `;
        el('overviewEmpty').style.display = 'block';
        el('overviewContent').style.display = 'none';
        
        state.runDirName = runName;
        state.selectedTask = null;
        state.trajectory = [];
        state.selectedStepIdx = 0;
        state.actionTypesCache = null;
        state.perTaskActionTypes = {};
        state.actionTypesLoading = false;
        clearMediaCache();
        
        // Load meta
        try {
          state.meta = await fetchJson(`/${runName}/meta.json`);
        } catch { state.meta = null; }
        
        // Load summary
        try {
          state.summary = await fetchJson(`/${runName}/summary.json`);
        } catch { state.summary = null; }
        
        // Load results.jsonl
        state.results = new Map();
        state.allResults = [];
        state.resultsByTask = new Map();
        try {
          const text = await fetchText(`/${runName}/results.jsonl`);
          for (const line of text.split('\n')) {
            if (!line.trim()) continue;
            try {
              const obj = JSON.parse(line);
              if (obj.id) {
                obj.task_id = obj.id;
                state.allResults.push(obj);
                
                if (!state.resultsByTask.has(obj.id)) {
                  state.resultsByTask.set(obj.id, []);
                }
                state.resultsByTask.get(obj.id).push(obj);
                
                const key = obj.trial_id !== undefined ? `${obj.id}_trial_${obj.trial_id}` : obj.id;
                state.results.set(key, obj);
                
                if (!state.results.has(obj.id)) {
                  state.results.set(obj.id, obj);
                }
              }
            } catch {}
          }
          
          for (const [taskId, trials] of state.resultsByTask) {
            trials.sort((a, b) => (a.trial_id ?? 0) - (b.trial_id ?? 0));
          }
        } catch {}
        
        // Load tasks - parse from directory names
        state.tasks = [];
        state.taskGroups = new Map();
        try {
          const trajData = await fetchJson(`/${runName}/trajectory`);
          const taskDirs = trajData.tasks || [];
          
          // Helper: convert dir name to result id format
          // e.g., wechat_OpenNewFriends_i0 -> wechat.OpenNewFriends_i0
          // Only replace the first underscore (between app and task name) with a dot
          const dirNameToResultId = (name) => {
            // Find the FIRST underscore followed by an uppercase letter — that's the suite/task boundary
            // e.g. x1_X1_SendDm -> x1.X1_SendDm, tencent_meeting_Check -> tencent_meeting.Check
            const match = name.match(/^(.*?)_([A-Z].*)$/);
            if (match) {
              return `${match[1]}.${match[2]}`;
            }
            return name;
          };
          
          for (const dirName of taskDirs) {
            const trialMatch = dirName.match(/^(.+)_t(\d+)$/);
            let baseTaskId, trialId;
            
            if (trialMatch) {
              baseTaskId = dirNameToResultId(trialMatch[1]);
              trialId = parseInt(trialMatch[2]);
            } else {
              baseTaskId = dirNameToResultId(dirName);
              trialId = 0;
            }
            
            const resultData = state.resultsByTask.get(baseTaskId)?.[0];
            const task_name = resultData?.task_name || '';
            
            const taskEntry = { 
              dirName, 
              task_id: baseTaskId, 
              baseTaskId,
              trialId,
              task_name, 
              meta: null 
            };
            
            state.tasks.push(taskEntry);
            
            if (!state.taskGroups.has(baseTaskId)) {
              state.taskGroups.set(baseTaskId, []);
            }
            state.taskGroups.get(baseTaskId).push(taskEntry);
          }
          
          state.tasks.sort((a, b) => {
            const cmp = a.baseTaskId.localeCompare(b.baseTaskId, 'zh-CN');
            if (cmp !== 0) return cmp;
            return (a.trialId ?? 0) - (b.trialId ?? 0);
          });
          
          for (const [taskId, trials] of state.taskGroups) {
            trials.sort((a, b) => (a.trialId ?? 0) - (b.trialId ?? 0));
          }
        } catch {}
        
        el('taskFilter').disabled = false;
        populateFilterOptions();
        renderAll();
        
        // 自动加载动作统计（后台异步，不阻塞界面）
        loadActionTypes();
        
        // Select first task without blocking
        if (state.tasks.length > 0) {
          state.isLoading = false;  // Reset before selectTask
          selectTask(state.tasks[0]);  // Don't await
          return;
        }
      } catch (e) {
        console.error('loadRunDir error:', e);
        el('overviewEmpty').innerHTML = `
          <div class="empty-icon">❌</div>
          <h3>加载失败</h3>
          <p style="color: var(--error);">${e.message || '未知错误'}</p>
          <button class="btn btn-secondary" onclick="loadRunDir('${runName}')" style="margin-top: 12px;">
            重试
          </button>
        `;
      } finally {
        state.isLoading = false;
      }
    }
    
    async function loadTrajectory(task) {
      state.trajectory = [];
      state.selectedStepIdx = 0;
      clearMediaCache();
      
      try {
        state.trajectory = await fetchJson(`/${state.runDirName}/trajectory/${task.dirName}/trajectory.json`);
        if (!Array.isArray(state.trajectory)) state.trajectory = [];
      } catch { state.trajectory = []; }
    }
    
    function clearMediaCache() {
      // Simply clear the cache - URLs are from API, not blob URLs
      state.mediaCache = new Map();
    }
    
    async function getMedia(idx) {
      if (state.mediaCache.has(idx)) return state.mediaCache.get(idx);
      const step = state.trajectory[idx];
      const media = { rawUrl: '', annotUrl: '', responseText: '', prompt: null };
      
      if (step && state.selectedTask) {
        const taskBasePath = `/${state.runDirName}/trajectory/${state.selectedTask.dirName}`;
        
        if (step.screenshot) {
          media.rawUrl = imageUrl(`${taskBasePath}/${step.screenshot}`);
        }
        if (step.screenshot_annotated) {
          media.annotUrl = imageUrl(`${taskBasePath}/${step.screenshot_annotated}`);
        }
        // Load model response text
        if (step.model_response_path) {
          try {
            media.responseText = await fetchText(`${taskBasePath}/${step.model_response_path}`);
          } catch {}
        }
        // Load prompt JSON
        const stepNum = step.step ?? (idx + 1);
        const promptFileName = `step_${String(stepNum).padStart(3, '0')}_prompt.json`;
        try {
          media.prompt = await fetchJson(`${taskBasePath}/${promptFileName}`);
        } catch {}
      }
      
      state.mediaCache.set(idx, media);
      return media;
    }
    
    // =========== Task Selection ===========
    async function selectTask(task) {
      console.log('selectTask called:', task?.dirName, 'isLoading:', state.isLoading);
      if (state.isLoading) {
        console.log('selectTask blocked by isLoading');
        return;
      }
      if (state.selectedTask?.dirName === task.dirName) {
        console.log('selectTask skipped - same task');
        return;
      }
      
      state.isLoading = true;
      console.log('selectTask starting for:', task?.dirName);
      try {
        state.selectedTask = task;
        renderTaskList();
        
        el('trajectoryContent').innerHTML = `
          <div class="empty" style="padding: 40px;">
            <div class="empty-icon">⏳</div>
            <h3>加载轨迹...</h3>
          </div>
        `;
        el('trajectoryContent').style.display = 'block';
        el('trajectoryEmpty').style.display = 'none';
        
        await loadTrajectory(task);
        console.log('selectTask trajectory loaded');
        
        renderDetail();
        renderTrajectory();
        renderAllImages();
        console.log('selectTask completed');
      } catch (e) {
        console.error('selectTask error:', e);
      } finally {
        state.isLoading = false;
        console.log('selectTask isLoading reset to false');
      }
    }
    
    function getTaskStatus(task) {
      return getTaskStatusForTrial(task);
    }
    
    // Get all trials for a specific task
    function getTrialsForTask(taskId) {
      return state.resultsByTask?.get(taskId) || [];
    }
    
    // Select a specific trial for viewing
    async function selectTrial(taskId, trialIdx) {
      if (state.isLoading) return;
      
      const taskGroup = state.taskGroups.get(taskId);
      if (taskGroup && trialIdx >= 0 && trialIdx < taskGroup.length) {
        const task = taskGroup[trialIdx];
        state.isLoading = true;
        try {
          state.selectedTask = task;
          renderTaskList();
          await loadTrajectory(task);
          renderDetail();
          renderTrajectory();
          renderAllImages();
        } catch (e) {
          console.error('selectTrial error:', e);
        } finally {
          state.isLoading = false;
        }
      }
    }

              const val = r[dimKey];

              if (!groups[val]) groups[val] = { total: 0, success: 0, goalSuccess: 0 };
              groups[val].total++;
              if (r.is_success) groups[val].success++;
              if (r.judge?.success) groups[val].goalSuccess++;

            if (Object.keys(groups).length === 0) return '';
            const sorted = Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
