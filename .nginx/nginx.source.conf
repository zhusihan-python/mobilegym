worker_processes 8;
pid __NGINX_DIR__/nginx.pid;
error_log __NGINX_DIR__/logs/error.log warn;

events {
    worker_connections 2048;
}

http {
    include __MIME_TYPES__;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 300;
    keepalive_requests 100000;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    log_format debug_502 '$time_local $status $request_length $bytes_sent "$request" "$upstream_addr" "$upstream_status"';
    map $status $log_non200 {
        200 0;
        304 0;
        default 1;
    }
    access_log __NGINX_DIR__/logs/access.log debug_502 if=$log_non200;

    client_body_temp_path __NGINX_DIR__/temp/client_body;
    proxy_temp_path       __NGINX_DIR__/temp/proxy;
    fastcgi_temp_path     __NGINX_DIR__/temp/fastcgi;
    uwsgi_temp_path       __NGINX_DIR__/temp/uwsgi;
    scgi_temp_path        __NGINX_DIR__/temp/scgi;

    server {
        listen __PORT__ ssl backlog=4096;
        http2 on;

        ssl_certificate __NGINX_DIR__/ssl/localhost.crt;
        ssl_certificate_key __NGINX_DIR__/ssl/localhost.key;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1h;
        ssl_protocols TLSv1.2 TLSv1.3;

        root __ROOT__/dist;
        index index.html;

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /@app-assets/ {
            expires 1y;
            try_files $uri =404;
        }

        location /sdcard/ {
            expires 1h;
            add_header Cache-Control "public";
        }

        location /api/gw/ {
            proxy_pass http://127.0.0.1:__API_PORT__;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # 论文 landing 页（直接 alias 到 web/，本地编辑即时生效，无需 build）
        location /paper/ {
            alias __ROOT__/web/;
            try_files $uri $uri/ /paper/index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 外部媒体/数据镜像（图片 + JSON）。物理路径在仓库根 mobilegym-data/（gitignored）。
        location /cdn/ {
            alias __ROOT__/mobilegym-data/;
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
            access_log off;                # 不记 200/304，省 IO
            tcp_nodelay on;                # 小响应立刻发
            sendfile on;
            sendfile_max_chunk 1m;
            try_files $uri =404;
        }

        # index.html 不缓存，确保 rebuild 后立刻生效
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
